# GPU override — opt-in. Gives the licensed container access to NVIDIA GPUs so
# the XGBoost surrogate runs on CUDA (examples/run_navigator.sh --gpu, or
# surrogate.device=cuda in a run config). WITHOUT this override the container
# has no GPU access and the surrogate silently uses the CPU fallback.
#
# Requirements on the host: an NVIDIA driver + the NVIDIA Container Toolkit
# (so `docker run --gpus all` works). Verify with:
#   docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi
#
# Enable by setting DMC_NAV_GPUS in .env (e.g. DMC_NAV_GPUS=all) — the navigator
# wrapper then layers this file on top of docker-compose.yml automatically.
services:
  navigator:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
